# CD — runs ONLY on push to main, AFTER all CI jobs pass.
# Deploys frontend (Vercel/Netlify), backend (Railway/Render), and runs migrations.
#
# Required secrets (Settings → Secrets → Actions):
#   VERCEL_TOKEN        — Vercel personal access token
#   VERCEL_ORG_ID       — Vercel org/team ID (from vercel link)
#   VERCEL_PROJECT_ID   — Vercel project ID (from vercel link)
#   RAILWAY_TOKEN       — Railway CLI token  (or RENDER_API_KEY for Render)
#   DATABASE_URL        — Production PostgreSQL connection string
#   HEALTH_CHECK_URL    — Full URL to POST after deploy (e.g. https://api.example.com/health)
#   DEPLOY_WEBHOOK_URL  — (optional) Slack/Discord webhook URL for failure notifications
#
# TODO: run `vercel link` locally, commit `.vercel/project.json`, then add
#       VERCEL_ORG_ID and VERCEL_PROJECT_ID from that file to GitHub secrets.

name: CD

on:
  push:
    branches: [main]

# Only one production deploy at a time
concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  # ── Gate: CI must pass before any deploy ─────────────────────────────────
  # This job waits for the CI workflow triggered by the same commit.
  # Because CI is a separate workflow, we use `workflow_run` or rely on
  # branch protection rules (recommended: require CI status checks in Settings
  # → Branches → main → Require status checks to pass).
  #
  # If you have branch protection set up, remove this comment block.
  # Otherwise, add a check-ci job using `gh run watch`.

  # ── Deploy Frontend (Vercel) ──────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # TODO: install Vercel CLI and configure project
      # Run: npx vercel link --token $VERCEL_TOKEN
      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Deploy to Vercel (production)
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

  # ── Deploy Backend (Railway) ──────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      # TODO: replace with Render deploy hook if you're using Render instead.
      # Render: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend service
        run: railway up --service backend --detach
        working-directory: apps/backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Prisma Migrate ────────────────────────────────────────────────────────
  migrate:
    name: Prisma Migrate Deploy
    runs-on: ubuntu-latest
    environment: production
    # Run migrations after backend code is deployed so schema matches code
    needs: [deploy-backend]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `prisma migrate deploy` applies pending migrations without prompting.
      # It is safe to run on every deploy — it is a no-op if migrations are current.
      - name: Apply pending migrations
        run: pnpm --filter @asm/backend exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Post-deploy Health Check ──────────────────────────────────────────────
  health-check:
    name: Post-deploy Health Check
    runs-on: ubuntu-latest
    needs: [deploy-frontend, migrate]
    steps:
      # Wait a moment for services to become ready after deploy
      - name: Wait for service warm-up
        run: sleep 20

      # TODO: update HEALTH_CHECK_URL secret to point at your real API health endpoint.
      # The endpoint should return HTTP 200 with { "ok": true }.
      - name: Ping API health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            "${{ secrets.HEALTH_CHECK_URL }}")
          echo "Health check returned HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check FAILED with status $STATUS"
            exit 1
          fi
          echo "Health check passed."

  # ── Failure Notification ──────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend, migrate, health-check]
    # Only notify when something upstream failed
    if: failure()
    steps:
      # TODO: set DEPLOY_WEBHOOK_URL secret to your Slack/Discord webhook.
      # Slack payload format:  {"text": "..."}
      # Discord payload format: {"content": "..."}
      - name: Send failure webhook
        if: ${{ secrets.DEPLOY_WEBHOOK_URL != '' }}
        run: |
          curl -s -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"🚨 Production deploy FAILED on commit \`${{ github.sha }}\` by ${{ github.actor }}. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
