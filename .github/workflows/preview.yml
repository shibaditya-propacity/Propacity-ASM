# Preview — deploys a preview environment for every PR and posts the URL as a comment.
# Tears down the preview when the PR is closed or merged.
#
# Required secrets:
#   VERCEL_TOKEN        — same as CD
#   VERCEL_ORG_ID       — same as CD
#   VERCEL_PROJECT_ID   — same as CD
#   GITHUB_TOKEN        — automatically provided by Actions (no manual setup needed)
#
# TODO: enable "Preview Deployments" in your Vercel project settings.

name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  # ── Deploy Preview ─────────────────────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview Environment
    runs-on: ubuntu-latest
    # Only deploy on open PRs (not when closed/merged)
    if: github.event.action != 'closed'
    # Expose the preview URL to the comment job below
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @asm/schemas
        run: pnpm --filter @asm/schemas build

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      # Deploy to Vercel preview (not --prod) — gets a unique URL per PR
      - name: Deploy preview to Vercel
        id: deploy
        run: |
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          PREVIEW_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $PREVIEW_URL"
        working-directory: apps/frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          # TODO: point VITE_API_BASE_URL at a preview/staging backend, not production
          VITE_API_BASE_URL: ${{ vars.VITE_API_PREVIEW_URL || 'https://api-staging.propacity-asm.com/api/v1' }}

  # ── Comment Preview URL on PR ─────────────────────────────────────────────
  comment-preview-url:
    name: Comment Preview URL
    runs-on: ubuntu-latest
    needs: [deploy-preview]
    if: github.event.action != 'closed'
    permissions:
      pull-requests: write
    steps:
      # Find existing preview comment (if PR was updated, update the comment instead of adding new one)
      - name: Find existing preview comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- propacity-asm-preview -->"

      - name: Post or update preview comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- propacity-asm-preview -->
            ## Preview Deployment

            | Status | URL |
            |--------|-----|
            | ✅ Ready | [${{ needs.deploy-preview.outputs.preview_url }}](${{ needs.deploy-preview.outputs.preview_url }}) |

            **Commit:** `${{ github.event.pull_request.head.sha }}`
            **Branch:** `${{ github.head_ref }}`

            > Preview environments are torn down when the PR is closed.

  # ── Teardown Preview ──────────────────────────────────────────────────────
  teardown-preview:
    name: Tear Down Preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      # TODO: Vercel automatically garbage-collects preview deployments after 30 days.
      # For immediate teardown or if using a different host, add teardown logic here.
      # Example for a self-hosted preview server:
      #   run: curl -X DELETE "https://preview-server.example.com/preview/${{ github.event.pull_request.number }}"
      - name: Log teardown
        run: |
          echo "PR #${{ github.event.pull_request.number }} closed."
          echo "Preview deployments on Vercel are automatically cleaned up."
          echo "If you need immediate teardown, add Vercel alias deletion here."
