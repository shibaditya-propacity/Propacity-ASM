services:
  - type: web
    name: propacity-asm-backend
    runtime: node
    plan: free
    buildCommand: >
      npm install -g pnpm &&
      pnpm install --no-frozen-lockfile &&
      cd apps/backend &&
      npx prisma generate &&
      npx prisma migrate deploy
    startCommand: cd apps/backend && npx tsx src/index.ts
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: propacity-asm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Set this to your Vercel frontend URL after you deploy it
      # e.g. https://propacity-asm.vercel.app
      - key: ALLOWED_ORIGIN
        sync: false
      # Brand Audit AI keys — fill these in the Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: APIFY_API_KEY
        sync: false
      - key: SHOT_API_KEY
        sync: false
      - key: WEBCRAWLER_API_KEY
        sync: false
      - key: COMPANY_ENRICH_API_KEY
        sync: false

databases:
  - name: propacity-asm-db
    plan: free
    databaseName: propacity_asm
    user: asm_user
