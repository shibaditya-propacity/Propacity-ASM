services:
  - type: web
    name: propacity-asm-backend
    runtime: node
    plan: free
    buildCommand: >
      npm install -g pnpm &&
      pnpm install --no-frozen-lockfile &&
      pnpm --filter @asm/schemas build &&
      cd apps/backend &&
      npx prisma generate &&
      npx prisma migrate deploy
    startCommand: cd apps/backend && npx tsx src/index.ts
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # ── Database (Neon PostgreSQL) ─────────────────────────────────────────────
      # Set this to your Neon connection string from https://console.neon.tech
      # Format: postgresql://user:password@host/db?sslmode=require&channel_binding=require
      - key: DATABASE_URL
        sync: false

      # ── Auth ──────────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true

      # ── CORS ──────────────────────────────────────────────────────────────────
      # Set to your Vercel frontend URL, e.g. https://propacity-asm.vercel.app
      - key: ALLOWED_ORIGIN
        sync: false

      # ── Brand Audit AI & Data Collection ──────────────────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: APIFY_API_KEY
        sync: false
      - key: SHOT_API_KEY
        sync: false
      - key: WEBCRAWLER_API_KEY
        sync: false
      - key: COMPANY_ENRICH_API_KEY
        sync: false
      - key: GEOAPIFY_API_KEY
        sync: false
      - key: METAPI_API_KEY
        sync: false
      - key: YOUTUBE_DATA_API_KEY
        sync: false
